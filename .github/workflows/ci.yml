name: Xqlite

env:
  DEFAULT_ELIXIR: "1.20"
  DEFAULT_OTP: "29"
  XQLITE_BUILD: "true"

permissions:
  contents: read

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  format_and_lint:
    name: Format & lints
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Elixir
        id: beam
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.DEFAULT_ELIXIR }}
          otp-version: ${{ env.DEFAULT_OTP }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Restore dependencies cache
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
            priv/native
          key: v0-elixir-lint-${{ runner.os }}-otp-${{ steps.beam.outputs.otp-version }}-elixir-${{ steps.beam.outputs.elixir-version }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            v0-elixir-lint-${{ runner.os }}-otp-${{ steps.beam.outputs.otp-version }}-elixir-${{ steps.beam.outputs.elixir-version }}-mix-

      - name: Restore Rust (Cargo) cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/xqlitenif
          prefix-key: "v0-rust-lint-${{ runner.os }}-otp-${{ steps.beam.outputs.otp-version }}"

      - name: Install dependencies
        run: mix deps.get

      - name: Check Elixir formatting
        run: mix format --check-formatted

      - name: Rust formatting
        working-directory: native/xqlitenif
        run: cargo fmt -- --check

      - name: Elixir compilation (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Dependency audit
        run: mix deps.audit

      - name: Sobelow static analysis
        run: mix sobelow --exit low

      - name: Rust clippy
        working-directory: native/xqlitenif
        run: cargo clippy -- -D warnings

      - name: Rust tests
        working-directory: native/xqlitenif
        run: cargo test

  dialyzer:
    name: Type checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: format_and_lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Elixir
        id: beam
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.DEFAULT_ELIXIR }}
          otp-version: ${{ env.DEFAULT_OTP }}

      - name: Restore dependencies cache
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
            priv/native
          key: v0-elixir-dialyzer-${{ runner.os }}-otp-${{ steps.beam.outputs.otp-version }}-elixir-${{ steps.beam.outputs.elixir-version }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            v0-elixir-dialyzer-${{ runner.os }}-otp-${{ steps.beam.outputs.otp-version }}-elixir-${{ steps.beam.outputs.elixir-version }}-mix-

      - name: Restore PLT cache
        uses: actions/cache@v5
        with:
          path: |
            priv/plts
          key: v0-plt-${{ runner.os }}-otp-${{ steps.beam.outputs.otp-version }}-elixir-${{ steps.beam.outputs.elixir-version }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            v0-plt-${{ runner.os }}-otp-${{ steps.beam.outputs.otp-version }}-elixir-${{ steps.beam.outputs.elixir-version }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Create PLT
        run: mix dialyzer --plt

      - name: Run Dialyzer
        run: mix dialyzer --format short

  test:
    name: Tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    needs: format_and_lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022]
        elixir: ["1.17", "1.18", "1.19", "1.20"]
        otp: ["26", "27", "28", "29"]
        rust: ["stable"]
        # Official pairs only (compatibility-and-deprecations): 1.17/1.18
        # top out at OTP 27, 1.19 at 28; 1.20 supports 27-29 (not 26).
        exclude:
          - otp: "28"
            elixir: "1.18"
          - otp: "28"
            elixir: "1.17"
          - otp: "29"
            elixir: "1.17"
          - otp: "29"
            elixir: "1.18"
          - otp: "29"
            elixir: "1.19"
          - otp: "26"
            elixir: "1.20"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Elixir
        id: beam
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Restore Elixir dependencies cache
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
            priv/native
          key: v0-elixir-test-${{ runner.os }}-otp-${{ steps.beam.outputs.otp-version }}-elixir-${{ steps.beam.outputs.elixir-version }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            v0-elixir-test-${{ runner.os }}-otp-${{ steps.beam.outputs.otp-version }}-elixir-${{ steps.beam.outputs.elixir-version }}-mix-

      - name: Restore Rust (Cargo) cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/xqlitenif
          prefix-key: "v0-rust-test-${{ runner.os }}-otp-${{ steps.beam.outputs.otp-version }}"

      - name: Install Elixir dependencies
        run: mix deps.get

      - name: Compile project (includes NIF)
        run: mix compile

      - name: Run tests
        run: mix test.seq

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: format_and_lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Elixir
        id: beam
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.DEFAULT_ELIXIR }}
          otp-version: ${{ env.DEFAULT_OTP }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Restore Elixir dependencies cache
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
            priv/native
          key: v0-elixir-coverage-${{ runner.os }}-otp-${{ steps.beam.outputs.otp-version }}-elixir-${{ steps.beam.outputs.elixir-version }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            v0-elixir-coverage-${{ runner.os }}-otp-${{ steps.beam.outputs.otp-version }}-elixir-${{ steps.beam.outputs.elixir-version }}-mix-

      - name: Restore Rust (Cargo) cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/xqlitenif
          prefix-key: "v0-rust-coverage-${{ runner.os }}-otp-${{ steps.beam.outputs.otp-version }}"

      - name: Install Elixir dependencies
        run: mix deps.get

      - name: Run tests sequentially with coverage export
        run: mix test.seq --cover

      - name: Push merged coverage to Coveralls
        run: mix coveralls.github --import-cover cover test/xqlite_test.exs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
